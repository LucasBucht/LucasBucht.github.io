<article class="wrap post">
  <div class="hunk-divider">
    <span>@@ -0,0 +1,1 @@ {{ page.date | date: "%Y-%m-%d" }}</span>
  </div>
  <h1 class="post__title">{{ page.title }}</h1>
  <div class="post__content">
    {{ content }}
  </div>
  <p class="see-all"><a href="{{ '/blog/' | relative_url }}">&larr; all posts</a></p>
</article>
