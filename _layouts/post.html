<article class="wrap post">
  <div class="section-label" style="margin-top:0; padding:0;">
    <span class="section-label__text">{{ page.date | date: "%Y-%m-%d" }}</span>
    <span class="section-label__line"></span>
  </div>
  <h1 class="post__title">{{ page.title }}</h1>
  <div class="post__content">
    {{ content }}
  </div>
  <p class="see-all"><a href="{{ '/blog/' | relative_url }}">&larr; all posts</a></p>
</article>
